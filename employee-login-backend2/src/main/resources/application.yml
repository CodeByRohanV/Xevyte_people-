spring:
 
  application:
 
    name: employee-login-backend2
 
 
 
  # ---------------- DATABASE ----------------
 
  # Credentials injected from AWS Secrets Manager: peopleproduction/environment/database
 
  datasource:
 
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/employee_login_db}
 
    username: ${SPRING_DATASOURCE_USERNAME:root}
 
    password: ${SPRING_DATASOURCE_PASSWORD:Laya@123}
 
 
 
  # ---------------- JPA / HIBERNATE ----------------
 
  jpa:
 
    hibernate:
 
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
 
    show-sql: false
 
    properties:
 
      hibernate:
 
        dialect: org.hibernate.dialect.MySQL8Dialect
 
        show_sql: false
 
        format_sql: false
 
        use_sql_comments: false
 
        jdbc:
 
          time_zone: Asia/Kolkata
 
 
 
  # ---------------- MAIL ----------------
 
  # Credentials injected from AWS Secrets Manager: peopleproduction/environment/data
 
  mail:
 
    host: smtp.gmail.com
 
    port: 587
 
    username: ${SPRING_MAIL_USERNAME:testadmin@xevyte.com}
 
    password: ${SPRING_MAIL_PASSWORD:moyfxbwpghirmfpg}
 
    properties:
 
      mail:
 
        smtp:
 
          auth: true
 
          starttls:
 
            enable: true
 
 
 
  # ---------------- MULTIPART ----------------
 
  servlet:
 
    multipart:
 
      enabled: true
 
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:100MB}
 
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:100MB}
 
 
 
  # ---------------- JACKSON (JSON TIMEZONE) ----------------
 
  jackson:
 
    time-zone: Asia/Kolkata
 
    date-format: yyyy-MM-dd
 
    serialization:
 
      write-dates-as-timestamps: false
 
 
 
server:
 
  address: 0.0.0.0
 
  port: ${SERVER_PORT:8082}
 
  error:
 
    include-message: always
 
    include-binding-errors: always
 
 
 
 
FRONTEND_URL: http://localhost:3000
 
BASE_DOMAIN: localhost
 
 
 
# ======================================================
 
# SCALOZ INTEGRATION
 
# SCALOZ_API_URL → AWS Secrets Manager: peopleproduction/environment/data
 
# Used in: EmployeeService (@Value)
 
# ======================================================
 
scaloz:
 
  api:
 
    url: ${SCALOZ_API_URL:http://localhost:8085/api/tenant-users/sync-from-hrms}

groq:
  api:
    key: ${GROQ_API_KEY:}

 
 
 
# ======================================================
 
# LOGGING CONFIGURATION
 
# ======================================================
 
logging:
 
  file:
 
    name: logs/application.log
 
  logback:
 
    rollingpolicy:
 
      max-file-size: 10MB
 
      max-history: 7
 
  level:
 
    root: INFO
 
    org.hibernate: OFF
 
    org.hibernate.SQL: OFF
 
    org.hibernate.type.descriptor.sql: OFF
 
    com.register.example: INFO
 
    com.register.example.aspect.LoggingAspect: INFO
 
    com.register.example.service.AuditService: INFO
 
    com.register.example.aspect.AuditAspect: INFO
 
    com.register.example.service.HikeLetterService: DEBUG
 
    com.register.example.service.CalcStructureService: DEBUG
 
  pattern:
 
    console: "%d{yyyy-MM-dd HH:mm:ss} - [%5level] - %logger{36} - %msg%n"
 
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
 